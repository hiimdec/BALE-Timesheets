    const IGrip = (p) => <Icon {...p}><circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/></Icon>;
    const IArrows = (p) => <Icon {...p}><path d="M7 16V4M3 8l4-4 4 4M17 8v12M21 16l-4 4-4-4"/></Icon>;
    const IUsers2 = (p) => <Icon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>;
    const IInfo = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></Icon>;
    const IAlert = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></Icon>;
    const IShare = (p) => <Icon {...p}><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></Icon>;
    const IDownload = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Icon>;
    const IMessage = (p) => <Icon {...p}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></Icon>;
    const IUp = (p) => <Icon {...p}><polyline points="18 15 12 9 6 15"/></Icon>;
    const IDown = (p) => <Icon {...p}><polyline points="6 9 12 15 18 9"/></Icon>;
    const ISort = (p) => <Icon {...p}><path d="M3 6h18"/><path d="M7 12h10"/><path d="M10 18h4"/></Icon>;
    const ICopy = (p) => <Icon {...p}><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></Icon>;
    const IUpload = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></Icon>;

    /* ═══════════════════════════ UI PRIMITIVES ═══════════════════════════ */

    const Btn = ({ children, variant = "primary", size = "md", className = "", ...p }) => {
      const base = "inline-flex items-center gap-2 font-semibold uppercase tracking-wide transition-all rounded-md border active:scale-95 disabled:opacity-40 disabled:pointer-events-none";
      const variants = {
        primary: "bg-sky-400 border-sky-500 text-black hover:bg-sky-300",
        ghost:   "bg-transparent border-neutral-700 text-neutral-200 hover:bg-neutral-800 hover:border-neutral-600",
        danger:  "bg-red-600 border-red-700 text-white hover:bg-red-500",
        success: "bg-emerald-500 border-emerald-600 text-black hover:bg-emerald-400",
        subtle:  "bg-neutral-800 border-neutral-700 text-neutral-200 hover:bg-neutral-700",
      };
      const sizes = { sm: "px-2 py-1.5 text-[10px]", md: "px-3 py-2.5 text-xs", lg: "px-5 py-3 text-sm" };
      return <button className={`${base} ${variants[variant]} ${sizes[size]} ${className}`} {...p}>{children}</button>;
    };

    const Field = ({ label, children, hint, disabled }) => (
      <label className={`block ${disabled ? "opacity-40" : ""}`}>
        <div className="text-[10px] uppercase tracking-wide text-sky-400 font-bold mb-1">{label}</div>
        {children}
        {hint && <div className="text-[10px] text-neutral-500 mt-1 leading-tight">{hint}</div>}
      </label>
    );

    const Input = (p) => <input {...p} className={`w-full bg-neutral-800 border border-neutral-700 focus:border-sky-400 focus:ring-1 focus:ring-sky-400/40 text-neutral-100 placeholder:text-neutral-500 px-3 py-2 font-mono outline-none rounded-md ${p.className || ""}`} />;
    const TimeInput = (p) => <Input type="time" step="300" {...p} />;
    const Select = ({ children, ...p }) => <select {...p} className={`w-full bg-neutral-800 border border-neutral-700 focus:border-sky-400 focus:ring-1 focus:ring-sky-400/40 text-neutral-100 px-3 py-2 outline-none rounded-md ${p.className || ""}`}>{children}</select>;

    const StatusMsg = ({ kind = "info", children }) => {
      const colors = { ok: "text-emerald-400", info: "text-neutral-400", warn: "text-amber-400", bad: "text-red-400" };
      const icons = { ok: <ICheck/>, info: <IInfo/>, warn: <IAlert/>, bad: <IWarn/> };
      return (
        <div className={`text-[11px] ${colors[kind]} flex items-start gap-1.5 leading-tight mt-1`}>
          <span className="mt-0.5">{icons[kind]}</span>
          <span>{children}</span>
        </div>
      );
    };

    const Toast = ({ show, children }) => (
      <div className={`fixed bottom-6 left-1/2 -translate-x-1/2 z-50 bg-emerald-500 text-black px-5 py-2 text-xs uppercase tracking-wide font-bold border border-emerald-600 rounded-full shadow-lg transition-all ${show ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4 pointer-events-none'}`}>
        {children}
      </div>
    );

    /* ═══════════════════════════ PRODUCTION FORM ═══════════════════════════ */

    function ProductionForm({ production, setProduction }) {
      const set = (k) => (e) => setProduction({ ...production, [k]: e.target.value });
      const isUntitled = production.title === "Untitled Production" || !production.title;
      return (
        <div className="space-y-4">
          <h2 className="text-lg font-semibold tracking-tight flex items-center gap-2"><IBriefcase size={16}/>Production Setup</h2>
          <div className="text-sm text-neutral-400">Set up the production details, then add crew and days.</div>

          {isUntitled && (
            <div className="bg-sky-950/40 border border-sky-800 px-4 py-3 text-sm text-sky-300 flex items-center gap-2">
              <IInfo size={14}/> Give this production a name to get started.
            </div>
          )}

          <div className="bg-neutral-900 border-l-4 border-sky-400 p-4 space-y-3 rounded-r-md">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
              <Field label="Production Title"><Input value={production.title || ""} onChange={set("title")} placeholder="e.g. Walkers / Lays — Minds Eye" autoFocus={isUntitled} /></Field>
              <Field label="Production Co."><Input value={production.prodCo || ""} onChange={set("prodCo")} placeholder="e.g. Minds Eye" /></Field>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
              <Field label="Start Date"><Input type="date" value={production.startDate || ""} onChange={set("startDate")} /></Field>
              <Field label="End Date"><Input type="date" value={production.endDate || ""} onChange={set("endDate")} /></Field>
            </div>
          </div>
          <div className="text-[10px] text-neutral-500 uppercase tracking-wider">Shows on exported PDFs. Start/End date fills the Timesheet Grid. Saved automatically.</div>
        </div>
      );
    }

    /* ═══════════════════════════ CREW MANAGER ═══════════════════════════ */

    function CrewManager({ crew, setCrew, autoStart = false, onAutoStartConsumed }) {
      const [editing, setEditing] = useState(null);
      const blank = { id: "", name: "", role: "Spark", bdr: ROLE_DEFAULTS["Spark"].bdr, otCoef: ROLE_DEFAULTS["Spark"].otCoef };
      const [form, setForm] = useState(blank);
      const [confirmRemove, setConfirmRemove] = useState(null);
      const dragIdx = useRef(null);
      const [overIdx, setOverIdx] = useState(null);

      useEffect(() => {
        if (autoStart) {
          setForm({ ...blank, id: uid() });
          setEditing("new");
          onAutoStartConsumed?.();
        }
      }, []);

      const startNew = () => { setForm({ ...blank, id: uid() }); setEditing("new"); };
      const startEdit = (c) => { setForm({ ...c }); setEditing(c.id); };
      const cancel = () => { setEditing(null); setForm(blank); };
      const save = () => {
        if (!form.name.trim()) return;
        setCrew((prev) => {
          const exists = prev.find((c) => c.id === form.id);
          return exists ? prev.map((c) => (c.id === form.id ? form : c)) : [...prev, form];
        });
        cancel();
      };
      const remove = (id) => { setCrew((prev) => prev.filter((c) => c.id !== id)); setConfirmRemove(null); };
      const onRoleChange = (role) => { const d = ROLE_DEFAULTS[role]; setForm((f) => ({ ...f, role, bdr: d.bdr, otCoef: d.otCoef })); };
      const sortByRole = () => {
        setCrew((prev) => [...prev].sort((a, b) => {
          const r = roleRank(a.role) - roleRank(b.role);
          return r !== 0 ? r : a.name.localeCompare(b.name);
        }));
      };
      const moveUp = (i) => { if (i === 0) return; setCrew((prev) => { const n = [...prev]; [n[i-1], n[i]] = [n[i], n[i-1]]; return n; }); };
      const moveDown = (i) => { setCrew((prev) => { if (i >= prev.length - 1) return prev; const n = [...prev]; [n[i+1], n[i]] = [n[i], n[i+1]]; return n; }); };

      const onDragStart = (i) => (e) => { dragIdx.current = i; e.dataTransfer.effectAllowed = "move"; };
      const onDragOver  = (i) => (e) => { e.preventDefault(); setOverIdx(i); };
      const onDragLeave = () => setOverIdx(null);
      const onDrop = (i) => (e) => {
        e.preventDefault();
        const from = dragIdx.current;
        if (from === null || from === i) { dragIdx.current = null; setOverIdx(null); return; }
        setCrew((prev) => {
          const next = [...prev];
          const [moved] = next.splice(from, 1);
          next.splice(i, 0, moved);
          return next;
        });
        dragIdx.current = null; setOverIdx(null);
      };

      return (
        <div className="space-y-4">
          <div className="flex items-center justify-between flex-wrap gap-2">
            <h2 className="text-lg font-semibold tracking-tight flex items-center gap-2"><IUsers size={16}/>Crew Roster</h2>
            <div className="flex gap-2">
              {crew.length > 1 && <Btn variant="ghost" onClick={sortByRole}><ISort/>Sort by Role</Btn>}
              {!editing && <Btn variant="primary" onClick={startNew}><IPlus/>Add Crew</Btn>}
            </div>
          </div>

          {editing && (
            <div className="bg-neutral-900 border-l-4 border-sky-400 p-4 space-y-3 rounded-r-md">
              <div className="text-[10px] uppercase tracking-[0.2em] text-sky-400 font-bold">{editing === "new" ? "New Crew Member" : "Edit Crew Member"}</div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                <Field label="Name"><Input value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} placeholder="e.g. Declan Duffy" /></Field>
                <Field label="Role"><Select value={form.role} onChange={(e) => onRoleChange(e.target.value)}>{ROLE_ORDER.map((r) => <option key={r} value={r}>{r}</option>)}</Select></Field>
                <Field label="Basic Day Rate (£)" hint="Editable — default is APA max for role"><Input type="number" step="0.01" value={form.bdr} onChange={(e) => setForm({ ...form, bdr: Number(e.target.value) })} /></Field>
                <Field label="OT Coefficient" hint="Grade I=1.5× · II=1.25× · III=1.0×">
                  <Select value={form.otCoef} onChange={(e) => setForm({ ...form, otCoef: Number(e.target.value) })}>
                    <option value={1.5}>Grade I — 1.5×</option>
                    <option value={1.25}>Grade II — 1.25×</option>
                    <option value={1}>Grade III — 1.0×</option>
                  </Select>
                </Field>
              </div>
              <div className="flex gap-2 pt-2">
                <Btn onClick={save} variant="success"><ICheck/>Save</Btn>
                <Btn onClick={cancel} variant="ghost"><IX/>Cancel</Btn>
              </div>
            </div>
          )}

          {crew.length === 0 && !editing && (
            <div className="bg-neutral-900 border border-dashed border-neutral-700 p-8 text-center">
              <div className="flex justify-center mb-2 text-neutral-700"><IUsers size={32}/></div>
              <div className="text-neutral-500 text-sm">No crew yet. Hit <span className="text-sky-400 font-bold">ADD CREW</span> to start.</div>
            </div>
          )}

          <div className="space-y-1">
            {crew.map((c, i) => (
              <div
                key={c.id}
                draggable
                onDragStart={onDragStart(i)}
                onDragOver={onDragOver(i)}
                onDragLeave={onDragLeave}
                onDrop={onDrop(i)}
                className={`bg-neutral-900 border transition-all flex items-center justify-between p-3 gap-2 ${overIdx === i ? "border-sky-400 border-t-4" : "border-neutral-800 hover:border-neutral-700"}`}
              >
                <div className="flex items-center gap-2 flex-1 min-w-0">
                  <div className="flex flex-col gap-0.5">
                    <button onClick={() => moveUp(i)} className="p-1 text-neutral-600 hover:text-sky-400 disabled:opacity-20" disabled={i === 0}><IUp/></button>
                    <button onClick={() => moveDown(i)} className="p-1 text-neutral-600 hover:text-sky-400 disabled:opacity-20" disabled={i === crew.length - 1}><IDown/></button>
                  </div>
                  <div className="text-neutral-600 hidden sm:block"><IGrip/></div>
                  <div className="min-w-0">
                    <div className="font-semibold text-neutral-100 truncate">{c.name}</div>
                    <div className="text-[11px] text-neutral-400 font-mono truncate">{c.role} · BDR {fmtGBP(c.bdr)} · BHR {fmtGBP(c.bdr / 10)} · OT {c.otCoef}×</div>
                  </div>
                </div>
                <div className="flex gap-1 flex-shrink-0">
                  {confirmRemove === c.id ? (
                    <>
                      <Btn size="sm" variant="danger" onClick={() => remove(c.id)}>Confirm</Btn>
                      <Btn size="sm" variant="ghost" onClick={() => setConfirmRemove(null)}>Cancel</Btn>
                    </>
                  ) : (
                    <>
                      <Btn size="sm" variant="ghost" onClick={() => startEdit(c)}><IPencil/></Btn>
                      <Btn size="sm" variant="ghost" onClick={() => setConfirmRemove(c.id)}><ITrash/></Btn>
                    </>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ═══════════════════════════ DAY ENTRY FORM ═══════════════════════════ */

    function DayEntryForm({ value, onChange, crew, allCrewMode }) {
      const v = value;
      const set = (patch) => onChange({ ...v, ...patch });
      const bs = deriveBreakState(v);

      const onDayTypeChange = (dayType) => {
        const callH = parseHHMM(v.callTime);
        const patch = { dayType };
        if (callH !== null) patch.wrapTime = toHHMM(callH + DEFAULT_HOURS[dayType]);
        set(patch);
      };
      const onCallChange = (callTime) => {
        const callH = parseHHMM(callTime);
        const patch = { callTime };
        if (callH !== null) {
          patch.wrapTime = toHHMM(callH + DEFAULT_HOURS[v.dayType]);
          patch.lunchStartTime = toHHMM(callH + 5);
          patch.secondBreakStartTime = toHHMM(callH + 11);
        }
        set(patch);
      };

      const callH = parseHHMM(v.callTime);
      const wrapH = parseHHMM(v.wrapTime);
      const autoNextDay = callH !== null && wrapH !== null && wrapH <= callH;
      const dow = dayOfWeek(v.date);
      const dayLabel = v.date ? weekday(v.date) : "";
      const isWeekend = dow === 0 || dow === 6;
      const isTravelDay = v.dayType === "Travel Day";

      return (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
          {!allCrewMode && (
            <Field label="Crew Member">
              <Select value={v.crewId} onChange={(e) => set({ crewId: e.target.value })}>
                <option value="">— Select —</option>
                {crew.map((c) => <option key={c.id} value={c.id}>{c.name} ({c.role})</option>)}
              </Select>
            </Field>
          )}
          {allCrewMode && (
            <div className="bg-sky-950/30 border border-sky-800 p-2">
              <div className="text-[10px] uppercase tracking-[0.15em] text-sky-400 font-bold">All Crew Mode</div>
              <div className="text-xs text-neutral-300">Creates a day for each of {crew.length} crew members. Travel & mileage apply to all.</div>
            </div>
          )}
          <Field label="Date" hint={v.date ? `${dayLabel}${isWeekend ? " — weekend rate applies" : ""}` : ""}>
            <Input type="date" value={v.date} onChange={(e) => set({ date: e.target.value })} />
          </Field>
          <Field label="Day Type">
            <Select value={v.dayType} onChange={(e) => onDayTypeChange(e.target.value)}>{DAY_TYPES.map((t) => <option key={t} value={t}>{t}</option>)}</Select>
          </Field>
          <div className="hidden md:block" />

          <Field label="Call Time" hint={callH !== null && callH < 5 ? "→ Night shoot (pre-5am)" : callH !== null && callH >= 17 ? "→ Night shoot (post-5pm)" : callH !== null && callH >= 5 && callH < 7 && !isTravelDay ? "→ Early call" : callH !== null && callH >= 11 && callH < 17 && !isTravelDay ? "→ Late call (calc from 11:00)" : ""}>
            <TimeInput value={v.callTime} onChange={(e) => onCallChange(e.target.value)} />
          </Field>
          <Field label="Wrap Time" hint={autoNextDay ? "Wrap is next day (auto-detected)" : ""}>
            <TimeInput value={v.wrapTime} onChange={(e) => set({ wrapTime: e.target.value })} />
          </Field>

          {!isTravelDay && (
            <>
              <div className="md:col-span-2 border-t border-neutral-800 pt-3 mt-2">
                <div className="text-[10px] uppercase tracking-[0.2em] text-sky-400 font-bold mb-2">Lunch (1st Break)</div>
              </div>

              <Field label="Lunch Start Time" hint={bs ? `Deadline: ${toHHMM(bs.lateThreshold)} · CWD threshold: ${toHHMM(bs.cwdThreshold)}` : ""}>
                <TimeInput value={v.lunchStartTime || ""} onChange={(e) => set({ lunchStartTime: e.target.value })} disabled={Number(v.lunchDurationMins) === 0} />
              </Field>
              <Field label="Lunch Duration">
                <Select value={Number(v.lunchDurationMins ?? 60)} onChange={(e) => set({ lunchDurationMins: Number(e.target.value) })}>
                  {LUNCH_DURATIONS.map((s) => <option key={s.v} value={s.v}>{s.label}</option>)}
                </Select>
              </Field>

              {bs && (
                <div className="md:col-span-2">
                  {bs.lunchMissed && bs.cwdApplies && <StatusMsg kind="bad">Lunch missed — Continuous Working Day. OT now starts at {toHHMM(bs.callH + 9)} (9h after call) instead of 11h.</StatusMsg>}
                  {bs.lunchMissed && !bs.cwdApplies && <StatusMsg kind="warn">Lunch missed. Note: CWD doesn't apply to {v.dayType} days.</StatusMsg>}
                  {bs.lunchVeryLate && bs.cwdApplies && <StatusMsg kind="bad">Lunch started after {toHHMM(bs.cwdThreshold)} (6.5h from call) — CWD triggered. OT now starts at {toHHMM(bs.callH + 9)}.</StatusMsg>}
                  {bs.lunchLate && <StatusMsg kind="warn">Late — should have started by {toHHMM(bs.lateThreshold)} (5.5h from call). £10 penalty applied.</StatusMsg>}
                  {!bs.lunchMissed && !bs.lunchLate && !bs.lunchVeryLate && bs.lunchDuration < 60 && <StatusMsg kind="warn">Curtailed by {60 - bs.lunchDuration}m. Ends {toHHMM(bs.lunchEndAbs)}. OT starts {60 - bs.lunchDuration}m earlier.</StatusMsg>}
                  {!bs.lunchMissed && !bs.lunchLate && !bs.lunchVeryLate && bs.lunchDuration === 60 && bs.lunchEndAbs && <StatusMsg kind="ok">On time. Lunch ends {toHHMM(bs.lunchEndAbs)}.</StatusMsg>}
                </div>
              )}

              {bs && (bs.lunchMissed || bs.lunchVeryLate) && (
                <Field label="Meal Provided?" hint="£7.50 allowance if no meal given">
                  <Select value={v.noMealProvided ? "no" : "yes"} onChange={(e) => set({ noMealProvided: e.target.value === "no" })}>
                    <option value="yes">Yes — meal given</option>
                    <option value="no">No — £7.50 allowance</option>
                  </Select>
                </Field>
              )}

              {bs && bs.continuousDay && (
                <>
                  <div className="md:col-span-2 border-t border-red-900/60 pt-3 mt-2">
                    <div className="text-[10px] uppercase tracking-[0.2em] text-red-400 font-bold mb-2">CWD Breaks</div>
                    <div className="text-[11px] text-neutral-400 leading-tight mb-3">APA §6.4: CWD requires a 30m break by {toHHMM(bs.cwd1Deadline)} (9h after call){bs.cwd2Required ? `, and another by ${toHHMM(bs.cwd2Deadline)} (12.5h after call)` : ""}. Missed breaks = 30m × BHR penalty.</div>
                  </div>
                  <Field label={`Break 1 — by ${toHHMM(bs.cwd1Deadline)}`}>
                    <Select value={v.cwdBreak1Given === false ? "no" : "yes"} onChange={(e) => set({ cwdBreak1Given: e.target.value === "yes" })}>
                      <option value="yes">Given</option>
                      <option value="no">Missed (+ 30m × BHR)</option>
                    </Select>
                  </Field>
                  {bs.cwd2Required && (
                    <Field label={`Break 2 — by ${toHHMM(bs.cwd2Deadline)}`}>
                      <Select value={v.cwdBreak2Given === false ? "no" : "yes"} onChange={(e) => set({ cwdBreak2Given: e.target.value === "yes" })}>
                        <option value="yes">Given</option>
                        <option value="no">Missed (+ 30m × BHR)</option>
                      </Select>
                    </Field>
                  )}
                </>
              )}

              {bs && !bs.continuousDay && (
                <>
                  <div className="md:col-span-2 border-t border-neutral-800 pt-3 mt-2">
                    <div className="text-[10px] uppercase tracking-[0.2em] text-sky-400 font-bold mb-2">2nd Break</div>
                    {!bs.secondBreakRequired && bs.sbDeadline && <StatusMsg kind="info">Not required — day ends before deadline ({toHHMM(bs.sbDeadline)}, 5.5h after lunch end).</StatusMsg>}
                  </div>

                  {bs.secondBreakRequired && (
                    <>
                      <Field label="2nd Break Start" hint={`Deadline: ${toHHMM(bs.sbDeadline)} (5.5h after lunch end)`}>
                        <TimeInput value={v.secondBreakStartTime || ""} onChange={(e) => set({ secondBreakStartTime: e.target.value })} disabled={Number(v.secondBreakDurationMins) === 0} />
                      </Field>
                      <Field label="2nd Break Duration">
                        <Select value={Number(v.secondBreakDurationMins ?? 30)} onChange={(e) => set({ secondBreakDurationMins: Number(e.target.value) })}>
                          {SECOND_BREAK_DURATIONS.map((s) => <option key={s.v} value={s.v}>{s.label}</option>)}
                        </Select>
                      </Field>
                      <div className="md:col-span-2">
                        {bs.sbState === "missed" && <StatusMsg kind="bad">Missed — 30m × BHR penalty applied.</StatusMsg>}
                        {bs.sbState === "late" && <StatusMsg kind="bad">Late (started after {toHHMM(bs.sbDeadline)}). APA: 2nd break can't be delayed — treated as missed. 30m × BHR penalty.</StatusMsg>}
                        {bs.sbState === "curtailed" && <StatusMsg kind="warn">Curtailed by {30 - bs.sbDuration}m. {30 - bs.sbDuration}m × BHR penalty.</StatusMsg>}
                        {bs.sbState === "given" && <StatusMsg kind="ok">Given on time.</StatusMsg>}
                      </div>
                    </>
                  )}
                </>
              )}

              <>
                <div className="md:col-span-2 border-t border-neutral-800 pt-3 mt-2">
                  <div className="text-[10px] uppercase tracking-[0.2em] text-sky-400 font-bold mb-2">Travel & Mileage</div>
                </div>
                <Field label="Travel Out (mins)" hint="First hour deducted"><Input type="number" min="0" value={v.travelOutMins || 0} onChange={(e) => set({ travelOutMins: Number(e.target.value) })} /></Field>
                <Field label="Travel Back (mins)" hint="First hour deducted"><Input type="number" min="0" value={v.travelBackMins || 0} onChange={(e) => set({ travelBackMins: Number(e.target.value) })} /></Field>
              </>
            </>
          )}
          <Field label="Mileage (outside M25)" hint="£0.50/mi return from W1F 9SE"><Input type="number" min="0" step="0.1" value={v.miles || 0} onChange={(e) => set({ miles: Number(e.target.value) })} /></Field>
        </div>
      );
    }

    /* ═══════════════════════════ LIVE CALC ═══════════════════════════ */

    function LiveCalc({ day, crew, production }) {
      if (!crew) return null;
      const calc = calculateDay(resolveDay(production, day, crew), crew);
      return (
        <div className="bg-black border border-sky-400 p-3 space-y-2">
          <div className="flex items-center justify-between">
            <div className="text-[10px] uppercase tracking-[0.2em] text-sky-400 font-bold">Live Calc — {calc.meta.dayLabel}{calc.meta.continuousDay ? " · CWD" : ""}</div>
            <div className="text-xs font-mono text-neutral-400">{calc.meta.workedHrs.toFixed(2)}h</div>
          </div>
          {calc.lines.length === 0 ? <div className="text-sm text-neutral-500">Fill in times to see calc.</div> : (
            <>
              <table className="w-full text-xs font-mono">
                <tbody>
                  {calc.lines.map((l, i) => (
                    <tr key={i} className="border-b border-neutral-800 last:border-0">
                      <td className="py-1 text-neutral-300">{l.label}</td>
                      <td className="py-1 text-neutral-500 text-[10px]">{l.detail}</td>
                      <td className="py-1 text-right text-neutral-400 text-[11px]">{l.rate != null ? fmtGBP(l.rate) : ""}</td>
                      <td className="py-1 text-right text-neutral-400 w-10 text-[11px]">{typeof l.qty === "number" ? (Number.isInteger(l.qty) ? l.qty : l.qty.toFixed(2)) : l.qty}</td>
                      <td className="py-1 text-right text-neutral-100 font-bold w-20">{fmtGBP(l.amount)}</td>
                    </tr>
                  ))}
                  <tr className="border-t border-sky-400">
                    <td colSpan={4} className="py-1 text-sky-400 font-bold uppercase text-[11px] tracking-wider">Day Total</td>
                    <td className="py-1 text-right text-sky-400 font-bold">{fmtGBP(calc.total)}</td>
                  </tr>
                </tbody>
              </table>
              {calc.meta.notes.length > 0 && <div className="text-[10px] text-neutral-500 italic">{calc.meta.notes.map((n, i) => <div key={i}>· {n}</div>)}</div>}
            </>
          )}
        </div>
      );
    }

    /* ═══════════════════════════ TIMESHEET GRID ═══════════════════════════ */

    function gridDisplayHours(resolvedDay) {
      const bs = deriveBreakState(resolvedDay);
      if (!bs) return 0;
      return bs.workedHrs - (bs.lunchMissed ? 0 : bs.lunchDuration / 60);
    }

    function GridCell({ day, date, production, member, assignMode, onEditDay, onAddDay, onRemoveDay, onMarkRemove, pendingRemove, isWeekEnd, isWeekend }) {
      const borderR = isWeekEnd ? "border-r border-neutral-500" : "border-r border-neutral-800";
      const bgBase  = isWeekend ? "bg-neutral-900/30" : "";

      if (!day) {
        if (assignMode) {
          return (
            <td onClick={() => onAddDay(member.id, date)}
              className={`px-2 py-2 text-center cursor-pointer hover:bg-sky-950/50 transition-colors ${borderR}`}
              style={{ minWidth: 80 }}>
              <span className="text-neutral-600 text-base leading-none">+</span>
            </td>
          );
        }
        return (
          <td className={`px-2 py-2 text-center ${borderR} ${bgBase}`} style={{ minWidth: 80 }}>
            <span className="text-[9px] text-neutral-600 uppercase tracking-wider">Rest</span>
          </td>
        );
      }

      const resolved = resolveDay(production, day, member);
      const { meta, lines } = calculateDay(resolved, member);

      const hasOT    = meta.otHrs > 0;
      const hasCWD   = meta.continuousDay;
      const hasLate1 = lines.some(l => l.label === "Late 1st Break");
      const hasMSB   = lines.some(l => /missed.*2nd|late.*2nd/i.test(l.label));
      const anyPenalty = hasOT || hasCWD || hasLate1 || hasMSB;

      const ct = resolved.callTime || "—";
      const wt = resolved.wrapTime || "—";
      const hrs = gridDisplayHours(resolved);
      const hrsLabel = Number.isInteger(hrs) ? `${hrs}h` : `${hrs.toFixed(1)}h`;

      if (assignMode) {
        const isMarked = pendingRemove === day.id;
        return (
          <td
            onClick={() => isMarked ? onRemoveDay(day.id) : onMarkRemove(day.id)}
            className={`px-2 py-1.5 cursor-pointer transition-colors ${borderR} ${isMarked ? "bg-red-950 hover:bg-red-900" : "hover:bg-neutral-800 " + bgBase}`}
            style={{ minWidth: 80 }}>
            {isMarked ? (
              <div className="text-center py-0.5">
                <div className="text-[9px] text-red-300 font-bold uppercase leading-tight">Remove?</div>
                <div className="text-red-400 font-bold leading-tight">×</div>
              </div>
            ) : (
              <>
                <div className="text-[9px] text-neutral-500 font-mono whitespace-nowrap leading-tight">{ct}–{wt}</div>
                <div className="text-[11px] font-bold text-neutral-400 leading-tight">{hrsLabel}</div>
              </>
            )}
          </td>
        );
      }

      return (
        <td onClick={() => onEditDay(day.id)}
          className={`px-2 py-1.5 cursor-pointer hover:bg-neutral-800 transition-colors ${borderR} ${bgBase}`}
          style={{ minWidth: 80 }}>
          <div className="text-[9px] text-neutral-500 font-mono whitespace-nowrap leading-tight">{ct}–{wt}</div>
          <div className="text-[11px] font-bold text-neutral-100 leading-tight">{hrsLabel}</div>
          {anyPenalty && (
            <div className="flex flex-wrap gap-0.5 mt-0.5">
              {hasOT    && <span className="text-[8px] bg-red-900 text-red-200 px-1 font-bold uppercase leading-tight py-px rounded-sm">OT</span>}
              {hasCWD   && <span className="text-[8px] bg-red-900 text-red-200 px-1 font-bold uppercase leading-tight py-px rounded-sm">CWD</span>}
              {hasLate1 && <span className="text-[8px] bg-red-900 text-red-200 px-1 font-bold uppercase leading-tight py-px rounded-sm">L1</span>}
              {hasMSB   && <span className="text-[8px] bg-red-900 text-red-200 px-1 font-bold uppercase leading-tight py-px rounded-sm">MSB</span>}
            </div>
          )}
        </td>
      );
    }

    function TimesheetGrid({ production, crew, days, onEditDay, onAddDay, onAddDate, onAddCrew, onAssignAll, onRemoveAllOnDate, onDuplicateDate, onRemoveDay, onBulkEditDate }) {
      const [assignMode, setAssignMode] = useState(false);
      const [assignDayType, setAssignDayType] = useState("Shoot");
      const [pendingRemove, setPendingRemove] = useState(null);
      const [editingDate, setEditingDate] = useState(null);
      const [dateEdit, setDateEdit] = useState({});

      useEffect(() => {
        setPendingRemove(null);
        if (assignMode) setEditingDate(null);
      }, [assignMode]);

      const openDateEdit = (date) => {
        const firstEntry = days.find(d => d.date === date);
        const firstMember = firstEntry ? crew.find(c => c.id === firstEntry.crewId) : null;
        const resolved = firstEntry && firstMember
          ? resolveDay(production, firstEntry, firstMember)
          : { ...DEFAULT_PRODUCTION_DAY, ...(production.defaultDay || {}) };
        setDateEdit({
          dayType: resolved.dayType || "Shoot",
          callTime: resolved.callTime || "08:00",
          wrapTime: resolved.wrapTime || "19:00",
          lunchStartTime: resolved.lunchStartTime || "13:30",
          lunchDurationMins: resolved.lunchDurationMins ?? 60,
        });
        setEditingDate(date);
      };

      const allDates = useMemo(() => getAllDates(production, days),
        [days, production.gridDates, production.startDate, production.endDate]);

      const handleAddDate = () => {
        const latest = allDates[allDates.length - 1];
        const base = latest ? new Date(latest + "T12:00:00") : new Date();
        base.setDate(base.getDate() + 1);
        const nextISO = base.toISOString().slice(0, 10);
        if (!allDates.includes(nextISO)) onAddDate(nextISO);
      };

      const index = useMemo(() => {
        const idx = {};
        for (const d of days) {
          if (!idx[d.date]) idx[d.date] = {};
          idx[d.date][d.crewId] = d;
        }
        return idx;
      }, [days]);

      if (crew.length === 0) {
        return <div className="bg-neutral-900 border border-dashed border-neutral-700 p-6 text-center text-sm text-neutral-500">Add crew members first.</div>;
      }

      return (
        <div className="space-y-3">
          <div className="flex items-center gap-3 flex-wrap">
            <div className="flex border border-neutral-700 overflow-hidden">
              <button onClick={() => setAssignMode(false)} className={`px-3 py-1.5 text-[10px] uppercase tracking-wider font-bold transition-colors ${!assignMode ? "bg-sky-400 text-black" : "bg-transparent text-neutral-400 hover:text-neutral-200"}`}>View</button>
              <button onClick={() => setAssignMode(true)} className={`px-3 py-1.5 text-[10px] uppercase tracking-wider font-bold border-l border-neutral-700 transition-colors ${assignMode ? "bg-sky-400 text-black" : "bg-transparent text-neutral-400 hover:text-neutral-200"}`}>Assign</button>
            </div>
            {assignMode && (
              <div className="flex items-center gap-3 flex-wrap">
                <div className="flex items-center gap-2">
                  <span className="text-[10px] text-neutral-500 uppercase tracking-wider whitespace-nowrap">Assign as:</span>
                  <Select value={assignDayType} onChange={e => setAssignDayType(e.target.value)} className="w-auto text-[10px] py-1 px-2">{DAY_TYPES.map(t => <option key={t} value={t}>{t}</option>)}</Select>
                </div>
                <div className="text-[10px] text-neutral-500 uppercase tracking-wider">Empty = add · Filled = mark then tap to remove · Header = assign all · Double-tap header = remove all</div>
              </div>
            )}
            {!assignMode && <div className="text-[10px] text-neutral-500 uppercase tracking-wider">Tap a date header to edit all crew on that day</div>}
          </div>

          {editingDate && !assignMode && (
            <div className="bg-neutral-900 border-l-4 border-sky-400 p-4 space-y-3 rounded-r-md">
              <div className="flex items-center justify-between">
                <div className="text-[10px] uppercase tracking-[0.2em] text-sky-400 font-bold">
                  Edit {weekday(editingDate)} {new Date(editingDate + "T12:00:00").toLocaleDateString("en-GB", { day: "numeric", month: "short" })} — updates all crew on this date
                </div>
                <Btn size="sm" variant="ghost" onClick={() => setEditingDate(null)}><IX/></Btn>
              </div>
              <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                <Field label="Day Type">
                  <Select value={dateEdit.dayType || "Shoot"} onChange={e => setDateEdit(p => ({...p, dayType: e.target.value}))}>
                    {DAY_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                  </Select>
                </Field>
                <Field label="Call Time"><TimeInput value={dateEdit.callTime || ""} onChange={e => setDateEdit(p => ({...p, callTime: e.target.value}))} /></Field>
                <Field label="Wrap Time"><TimeInput value={dateEdit.wrapTime || ""} onChange={e => setDateEdit(p => ({...p, wrapTime: e.target.value}))} /></Field>
                <Field label="Lunch Start"><TimeInput value={dateEdit.lunchStartTime || ""} onChange={e => setDateEdit(p => ({...p, lunchStartTime: e.target.value}))} /></Field>
                <Field label="Lunch Duration">
                  <Select value={dateEdit.lunchDurationMins ?? 60} onChange={e => setDateEdit(p => ({...p, lunchDurationMins: Number(e.target.value)}))}>
                    {LUNCH_DURATIONS.map(d => <option key={d.v} value={d.v}>{d.label}</option>)}
                  </Select>
                </Field>
              </div>
              <div className="flex gap-2">
                <Btn variant="success" onClick={() => { onBulkEditDate(editingDate, dateEdit); setEditingDate(null); }}>
                  <ICheck/>Apply to {weekday(editingDate)}
                </Btn>
                <Btn variant="ghost" onClick={() => setEditingDate(null)}><IX/>Cancel</Btn>
              </div>
            </div>
          )}

          <div className="overflow-x-auto border border-neutral-800">
            <table className="border-collapse text-xs" style={{ minWidth: "max-content" }}>
              <thead>
                <tr className="border-b border-neutral-700">
                  <th className="text-left px-3 py-2 text-[10px] uppercase tracking-wider text-neutral-500 font-bold whitespace-nowrap border-r border-neutral-700 bg-neutral-950"
                    style={{ position: "sticky", left: 0, zIndex: 20, minWidth: 120 }}>Crew</th>
                  {allDates.map((date, i) => {
                    const dow = dayOfWeek(date);
                    const isSat = dow === 6;
                    const isSun = dow === 0;
                    const isWeekEnd = isSat && !!allDates[i + 1];
                    const headerBg  = isSun ? "bg-red-950/60"   : isSat ? "bg-amber-950/60" : "bg-neutral-950";
                    const textColor = isSun ? "text-red-300"    : isSat ? "text-amber-300"  : "text-neutral-400";
                    const borderClass = isWeekEnd ? "border-r border-neutral-500" : "border-r border-neutral-800";
                    const day3   = new Date(date + "T12:00:00").toLocaleDateString("en-GB", { weekday: "short" });
                    const dayNum = new Date(date + "T12:00:00").toLocaleDateString("en-GB", { day: "numeric", month: "short" });
                    return (
                      <th key={date}
                        onClick={assignMode
                          ? () => { setPendingRemove(null); onAssignAll(date, assignDayType); }
                          : () => editingDate === date ? setEditingDate(null) : openDateEdit(date)}
                        onDoubleClick={assignMode ? (e) => { e.preventDefault(); onRemoveAllOnDate(date); } : undefined}
                        className={`px-2 py-1.5 font-bold text-center cursor-pointer ${headerBg} ${borderClass} ${assignMode ? "hover:bg-sky-950/40" : "hover:bg-neutral-800/60"}${editingDate === date && !assignMode ? " ring-2 ring-inset ring-sky-400" : ""}`}
                        style={{ minWidth: 80 }}>
                        <div className={`text-[9px] uppercase tracking-wider ${textColor}`}>{day3}</div>
                        <div className="text-[11px] text-neutral-200 whitespace-nowrap">{dayNum}</div>
                        {!assignMode && days.some(d => d.date === date) && (
                          <button onClick={e => { e.stopPropagation(); onDuplicateDate(date); }} className="mt-0.5 text-neutral-600 hover:text-sky-400 transition-colors" title="Duplicate this date"><ICopy size={10}/></button>
                        )}
                      </th>
                    );
                  })}
                  <th className="px-2 py-1.5 bg-neutral-950 border-l border-neutral-700" style={{ minWidth: 48 }}>
                    <button onClick={handleAddDate} className="text-neutral-500 hover:text-sky-400 transition-colors text-base leading-none font-bold" title="Add next day">+</button>
                  </th>
                </tr>
              </thead>
              <tbody>
                {crew.length === 0 ? (
                  <tr><td colSpan={allDates.length + 2} className="px-3 py-6 text-center text-sm text-neutral-500">Add crew members first.</td></tr>
                ) : (
                  <>
                    {crew.map(member => (
                      <tr key={member.id} className="border-b border-neutral-800 last:border-0">
                        <td className="px-3 py-2 whitespace-nowrap border-r border-neutral-700 bg-neutral-950"
                          style={{ position: "sticky", left: 0, zIndex: 10 }}>
                          <div className="text-[11px] font-semibold text-neutral-200">{member.name}</div>
                          <div className="text-[9px] text-neutral-500 uppercase tracking-wider">{member.role}</div>
                        </td>
                        {allDates.length === 0 ? (
                          <td className="px-3 py-4 text-center text-neutral-600 text-sm">—</td>
                        ) : allDates.map((date, i) => {
                          const dow = dayOfWeek(date);
                          const isSat = dow === 6;
                          const isSun = dow === 0;
                          const isWeekEnd = isSat && !!allDates[i + 1];
                          return (
                            <GridCell
                              key={date}
                              day={index[date]?.[member.id]}
                              date={date}
                              production={production}
                              member={member}
                              assignMode={assignMode}
                              onEditDay={onEditDay}
                              onAddDay={(crewId, d) => { setPendingRemove(null); onAddDay(crewId, d, assignDayType); }}
                              onRemoveDay={onRemoveDay}
                              onMarkRemove={id => setPendingRemove(id)}
                              pendingRemove={pendingRemove}
                              isWeekEnd={isWeekEnd}
                              isWeekend={isSat || isSun}
                            />
                          );
                        })}
                        <td className="border-l border-neutral-700 bg-neutral-950" />
                      </tr>
                    ))}
                    <tr className="border-t border-neutral-700">
                      <td className="px-3 py-2 bg-neutral-950 border-r border-neutral-700" style={{ position: "sticky", left: 0, zIndex: 10 }}>
                        <button onClick={onAddCrew} className="text-[10px] uppercase tracking-wider font-bold text-neutral-500 hover:text-sky-400 transition-colors flex items-center gap-1">
                          <span className="text-base leading-none">+</span> Crew
                        </button>
                      </td>
                      <td colSpan={allDates.length + 1} className="bg-neutral-950" />
                    </tr>
                  </>
                )}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    /* ═══════════════════════════ DAYS MANAGER ═══════════════════════════ */

    function dayTypeDefaults(dayType) {
      return {
        callTime: "08:00",
        wrapTime: toHHMM(8 + (DEFAULT_HOURS[dayType] || 11)),
        ...(dayType === "Travel Day" ? { lunchDurationMins: 0 } : {}),
      };
    }

    function makeBlankDay(crewId = "") {
      return {
        id: uid(), crewId, date: todayISO(),
        wrapNextDay: false,
        noMealProvided: false, secondBreakDurationMins: 30,
        cwdBreak1Given: true, cwdBreak2Given: true,
        travelOutMins: 0, travelBackMins: 0, miles: 0,
      };
    }

    function DaysManager({ days, setDays, crew, production, showToast, onAddDate, onAddCrew }) {
      const [editing, setEditing] = useState(null);
      const [form, setForm] = useState(() => makeBlankDay());
      const [confirmRemove, setConfirmRemove] = useState(null);
      const [gridView, setGridView] = useState(true);
      const editPanelRef = useRef(null);
      useEffect(() => {
        if (editing && editPanelRef.current) editPanelRef.current.scrollIntoView({ behavior: "smooth", block: "start" });
      }, [editing]);

      const startNew = () => {
        if (crew.length === 0) return;
        const d = { ...DEFAULT_PRODUCTION_DAY, ...(production.defaultDay ?? {}) };
        const callH = parseHHMM(d.callTime) ?? 8;
        setForm({ ...d, ...makeBlankDay(crew[0].id), secondBreakStartTime: toHHMM(callH + 11) });
        setEditing("new");
      };
      const startNewAll = () => {
        if (crew.length === 0) return;
        const d = { ...DEFAULT_PRODUCTION_DAY, ...(production.defaultDay ?? {}) };
        const callH = parseHHMM(d.callTime) ?? 8;
        setForm({ ...d, ...makeBlankDay(""), secondBreakStartTime: toHHMM(callH + 11) });
        setEditing("new-all");
      };
      const startEdit = (d) => { setForm(migrateDay(d)); setEditing(d.id); };
      const cancel = () => { setEditing(null); };
      const handleEditDayFromGrid = (id) => { const d = days.find(day => day.id === id); if (d) startEdit(d); };
      const handleAddDayFromGrid = (crewId, date, dayType = "Shoot") => { setDays(prev => [...prev, { ...makeBlankDay(crewId), date, dayType, ...dayTypeDefaults(dayType) }]); };
      const handleRemoveDayFromGrid = (id) => { setDays(prev => prev.filter(d => d.id !== id)); };
      const handleBulkEditDate = (date, overrides) => {
        const { dayType, callTime, wrapTime, lunchStartTime, lunchDurationMins } = overrides;
        setDays(prev => prev.map(d =>
          d.date !== date ? d : { ...d, dayType, callTime, wrapTime, lunchStartTime, lunchDurationMins }
        ));
      };
      const handleAssignAllOnDate = (date, dayType = "Shoot") => {
        const toAdd = crew.filter(m => !days.find(d => d.date === date && d.crewId === m.id));
        if (toAdd.length > 0) setDays(prev => [...prev, ...toAdd.map(m => ({ ...makeBlankDay(m.id), date, dayType, ...dayTypeDefaults(dayType) }))]);
      };
      const handleRemoveAllOnDate = (date) => {
        const count = days.filter(d => d.date === date).length;
        if (count === 0) return;
        if (!window.confirm(`Remove all ${count} entr${count === 1 ? 'y' : 'ies'} on ${fmtDate(date)}? This cannot be undone.`)) return;
        setDays(prev => prev.filter(d => d.date !== date));
      };

      const handleDuplicateDate = (sourceDate) => {
        const source = days.filter(d => d.date === sourceDate);
        if (source.length === 0) return;
        const next = new Date(sourceDate + "T12:00:00");
        next.setDate(next.getDate() + 1);
        const defaultTarget = next.toISOString().slice(0, 10);
        const input = window.prompt(`Copy ${source.length} entr${source.length === 1 ? 'y' : 'ies'} from ${fmtDateShort(sourceDate)} to:`, defaultTarget);
        if (!input) return;
        const targetDate = input.trim();
        if (!/^\d{4}-\d{2}-\d{2}$/.test(targetDate)) { showToast("Invalid date — use YYYY-MM-DD"); return; }
        if (targetDate === sourceDate) { showToast("Target date is the same as source"); return; }
        const existing = days.filter(d => d.date === targetDate);
        const copies = source.map(d => ({ ...d, id: uid(), date: targetDate }));
        if (existing.length > 0) {
          if (!window.confirm(`${fmtDateShort(targetDate)} already has ${existing.length} entr${existing.length === 1 ? 'y' : 'ies'}. Replace them?`)) return;
          setDays(prev => [...prev.filter(d => d.date !== targetDate), ...copies]);
        } else {
          setDays(prev => [...prev, ...copies]);
        }
      };

      const save = () => {
        if (!form.date || !form.callTime || !form.wrapTime) return;
        if (editing === "new-all") {
          const newDays = crew.map((c) => ({ ...form, id: uid(), crewId: c.id }));
          setDays((prev) => [...prev, ...newDays]);
        } else {
          if (!form.crewId) return;
          setDays((prev) => {
            const exists = prev.find((d) => d.id === form.id);
            return exists ? prev.map((d) => (d.id === form.id ? form : d)) : [...prev, form];
          });
        }
        cancel();
      };

      const remove = (id) => { setDays((prev) => prev.filter((d) => d.id !== id)); setConfirmRemove(null); };
      const duplicate = (d) => setDays((prev) => [...prev, { ...d, id: uid() }]);

      const handleDayText = async (d, c) => {
        const text = generateDayText(d, c, production);
        const r = await shareTextOrCopy(text, `${c.name} ${fmtDateShort(d.date)}`);
        if (r === 'copied' || r === 'prompted') showToast('Copied to clipboard');
      };
      const handleDayPdf = async (d, c) => { await exportDayPdf(d, c, production); };

      const grouped = useMemo(() => {
        const by = {};
        days.forEach((d) => { (by[d.date] = by[d.date] || []).push(d); });
        Object.values(by).forEach((arr) => arr.sort((a, b) => {
          const ia = crew.findIndex((c) => c.id === a.crewId);
          const ib = crew.findIndex((c) => c.id === b.crewId);
          return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
        }));
        return Object.entries(by).sort(([a], [b]) => a.localeCompare(b));
      }, [days, crew]);

      return (
        <div className="space-y-4">
          <div className="flex items-center justify-between flex-wrap gap-2">

          {crew.length === 0 && <div className="bg-neutral-900 border border-dashed border-neutral-700 p-6 text-center text-sm text-neutral-500">Add crew members first.</div>}

          {!gridView && days.length === 0 && !editing && crew.length > 0 && (

              return (

                  <div className="flex items-baseline justify-between mb-2 border-b border-neutral-800 pb-1">

                          </div>

              );
            })}

          )}

    /* ═══════════════════════════ EXPORT TAB ═══════════════════════════ */

    function ExportTab({ production, crew, days, showToast }) {
      const [busy, setBusy] = useState(null);

      const byCrew = useMemo(() => {
        const m = new Map();
        days.forEach((d) => {
          const c = crew.find((cc) => cc.id === d.crewId); if (!c) return;
          if (!m.has(c.id)) m.set(c.id, { crew: c, entries: [] });
          m.get(c.id).entries.push(d);
        });
        return crew.map((c) => m.get(c.id)).filter(Boolean);
      }, [crew, days]);

      const grandTotal = byCrew.reduce((s, { crew: c, entries }) => s + entries.reduce((t, e) => t + calculateDay(resolveDay(production, e, c), c).total, 0), 0);

      const handleAllPdf = async () => {
        setBusy('all-pdf');
        try { await exportAllPdf(production, crew, days); showToast('PDF ready'); } catch (e) { console.error(e); showToast('Export failed'); }
        setBusy(null);
      };

      const handleAllPdfDownload = async () => {
        setBusy('all-pdf-dl');
        try { await exportAllPdf(production, crew, days, { download: true }); showToast('PDF downloaded'); } catch (e) { console.error(e); showToast('Export failed'); }
        setBusy(null);
      };

      const handleCrewPdf = async (c, entries) => {
        setBusy(`pdf-${c.id}`);
        try { await exportCrewPdf(c, entries, production); showToast('PDF ready'); } catch (e) { console.error(e); showToast('Export failed'); }
        setBusy(null);
      };

      const handleCrewPdfDownload = async (c, entries) => {
        setBusy(`pdf-dl-${c.id}`);
        try { await exportCrewPdf(c, entries, production, { download: true }); showToast('PDF downloaded'); } catch (e) { console.error(e); showToast('Export failed'); }
        setBusy(null);
      };

      const handleCrewText = async (c, entries) => {
        setBusy(`txt-${c.id}`);
        try {
          const text = generateCrewText(c, entries, production);
          const r = await shareTextOrCopy(text, `${c.name} Timesheet`);
          if (r === 'copied' || r === 'prompted') showToast('Copied to clipboard');
        } catch (e) { console.error(e); }
        setBusy(null);
      };

      if (byCrew.length === 0) {
        return (
          <div className="bg-neutral-900 border border-dashed border-neutral-700 p-8 text-center">
            <div className="flex justify-center mb-2 text-neutral-700"><IFile size={32}/></div>
            <div className="text-neutral-500 text-sm">Nothing to export yet. Add crew and day entries first.</div>
          </div>
        );
      }

      return (
        <div className="space-y-6">
          <h2 className="text-lg font-semibold tracking-tight flex items-center gap-2"><IShare size={16}/>Export</h2>

          {/* Combined export */}
          <div className="bg-neutral-900 border-l-4 border-sky-400 p-4 space-y-3 rounded-r-md">
            <div className="flex items-baseline justify-between">
              <div>
                <div className="text-[10px] uppercase tracking-[0.2em] text-sky-400 font-bold">Everyone</div>
                <div className="text-sm text-neutral-300 mt-0.5">{byCrew.length} crew · {days.length} day entries</div>
              </div>
              <div className="font-mono font-bold text-sky-400 text-lg">{fmtGBP(grandTotal)}</div>
            </div>
            <div className="flex gap-2 flex-wrap">
              <Btn variant="primary" onClick={handleAllPdf} disabled={busy !== null}>
                <IDownload/>{busy === 'all-pdf' ? 'Building…' : 'Share PDF'}
              </Btn>
              <Btn variant="subtle" onClick={handleAllPdfDownload} disabled={busy !== null}>
                <IDownload/>{busy === 'all-pdf-dl' ? 'Building…' : 'Download PDF'}
              </Btn>
            </div>
            <div className="text-[11px] text-neutral-500 leading-relaxed">
              One PDF with a crew summary on page 1, then each crew member's full timesheet on their own page{byCrew.some(({ entries }) => entries.length > 1) ? '(s)' : ''}.
            </div>
          </div>

          {/* Per crew */}
          <div className="space-y-2">
            <div className="text-[10px] uppercase tracking-[0.2em] text-neutral-400 font-bold">Per Crew Member</div>
            {byCrew.map(({ crew: c, entries }) => {
              const total = entries.reduce((s, e) => s + calculateDay(resolveDay(production, e, c), c).total, 0);
              const totalHrs = entries.reduce((s, e) => s + calculateDay(resolveDay(production, e, c), c).meta.workedHrs, 0);
              return (
                <div key={c.id} className="bg-neutral-900 border border-neutral-800 p-3">
                  <div className="flex items-center justify-between gap-3 flex-wrap">
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2">
                        <span className="font-semibold text-neutral-100">{c.name}</span>
                        <span className="text-[10px] uppercase tracking-wider bg-neutral-800 text-neutral-400 px-1.5 py-0.5">{c.role}</span>
                      </div>
                      <div className="text-[11px] text-neutral-400 font-mono mt-1">{entries.length} day{entries.length !== 1 ? 's' : ''} · {totalHrs.toFixed(1)}h · <span className="text-sky-400 font-bold">{fmtGBP(total)}</span></div>
                    </div>
                    <div className="flex gap-2 flex-wrap">
                      <Btn size="md" variant="subtle" onClick={() => handleCrewText(c, entries)} disabled={busy !== null}>
                        <IMessage/>{busy === `txt-${c.id}` ? '…' : 'Text'}
                      </Btn>
                      <Btn size="md" variant="subtle" onClick={() => handleCrewPdf(c, entries)} disabled={busy !== null}>
                        <IDownload/>{busy === `pdf-${c.id}` ? '…' : 'Share PDF'}
                      </Btn>
                      <Btn size="md" variant="ghost" onClick={() => handleCrewPdfDownload(c, entries)} disabled={busy !== null}>
                        <IDownload/>{busy === `pdf-dl-${c.id}` ? '…' : 'Download PDF'}
                      </Btn>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          <div className="bg-neutral-900 border border-neutral-800 p-3 text-[11px] text-neutral-400 leading-relaxed">
            <IInfo/> <span className="align-middle">On iPad: the Share Sheet opens — pick Messages, Mail, or AirDrop. If you hit Save to Files, the PDF goes to Files → On My iPad.</span>
          </div>
        </div>
      );
    }

    /* ═══════════════════════════ PRODUCTION APP ═══════════════════════════ */

    function ProductionApp({ production, setProduction, onBack }) {

// Convenience aliases — child components keep receiving crew/days as before
const crew = production.crew ?? [];
const days = production.days ?? [];

// Derived setters — wrap setProduction so child components work unchanged
const setCrew = (updater) =>
  setProduction((prev) => ({
    ...prev,
    crew: typeof updater === "function" ? updater(prev.crew ?? []) : updater,
  }));

const setDays = (updater) =>
  setProduction((prev) => {
    const next = typeof updater === "function" ? updater(prev.days ?? []) : updater;
    return { ...prev, days: next.map(migrateDay) };
  });
      const [tab, setTab] = useState("setup");
      const [saveToast, setSaveToast] = useState(false);
      const [toastMsg, setToastMsg] = useState(null);
      const [resetMode, setResetMode] = useState(false);
      const [openCrewForm, setOpenCrewForm] = useState(false);

      const handleGridAddDate = (date) => setProduction(p => ({ ...p, gridDates: [...(p.gridDates || []), date] }));
      const handleGridAddCrew = () => { setOpenCrewForm(true); setTab("setup"); };

      const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(null), 2000); };

      useEffect(() => {
        if (crew.length === 0 && days.length === 0 && !production.title && !production.prodCo) return;
        setSaveToast(true);
        const t = setTimeout(() => setSaveToast(false), 1200);
        return () => clearTimeout(t);
      }, [crew, days, production]);

      const clearAll = () => {
        setProduction((prev) => ({ id: prev.id, title: "", prodCo: "", crew: [], days: [], defaultDay: DEFAULT_PRODUCTION_DAY, gridDates: [] }));

      };

      const totalShoot = days.reduce((s, d) => { const c = crew.find((cc) => cc.id === d.crewId); return c ? s + calculateDay(resolveDay(production, d, c), c).total : s; }, 0);

      return (
        <div className="min-h-screen bg-neutral-950 text-neutral-100">

            <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-3 flex-wrap">
              <div>
                <button onClick={onBack} className="text-[10px] uppercase tracking-[0.2em] text-neutral-400 hover:text-sky-400 transition-colors font-bold mb-1 flex items-center gap-1">← Derrick's TimeMachine</button>
                <div className="font-bold uppercase tracking-tight leading-none text-sm">{production.title || <span className="text-neutral-500">Untitled Production</span>}</div>

              <div className="flex items-center gap-3">

                <div className="text-[11px] font-mono text-neutral-400 hidden md:block">Total: <span className="text-sky-400 font-bold">{fmtGBP(totalShoot)}</span></div>

              {[
                { k: "setup",  label: "Setup",      I: IBriefcase },

    /* ═══════════════════════════ PRODUCTIONS SCREEN ═══════════════════════════ */

    function ProductionsScreen({ productions, onOpen, onCreate, onDelete, onExport, onImport }) {
      const importRef = useRef(null);

      const handleFileSelect = (e) => {
        const file = e.target.files[0];
        e.target.value = '';
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const raw = JSON.parse(ev.target.result);
            const arr = Array.isArray(raw) ? raw : (Array.isArray(raw?.productions) ? raw.productions : null);
            if (!arr || !arr.every(p => p && typeof p.id === 'string')) {
              window.alert('Invalid backup file — not a valid productions export.');
              return;
            }
            onImport(arr);
          } catch {
            window.alert('Could not read file — is it a valid JSON backup?');
          }
        };
        reader.readAsText(file);
      };

      // Derive a sort key (YYYY-MM-DD or null) for each production — display only, no mutation
      const sortKey = (p) => {
        if (p.startDate) return p.startDate;
        const dates = (p.days ?? []).map(d => d.date).filter(Boolean).sort();
        return dates.length > 0 ? dates[0] : null;
      };
      const monthLabel = (key) => {
        if (!key) return "No Date";
        const d = new Date(key + "T12:00:00");
        return d.toLocaleString("default", { month: "long", year: "numeric" });
      };

      // Sort descending (most recent first), nulls last
      const sorted = [...productions].sort((a, b) => {
        const ka = sortKey(a), kb = sortKey(b);
        if (ka === kb) return 0;
        if (!ka) return 1;
        if (!kb) return -1;
        return ka < kb ? 1 : -1;
      });

      // Group into [{ label, items }] preserving sorted order
      const groups = [];
      for (const p of sorted) {
        const label = monthLabel(sortKey(p));
        const last = groups[groups.length - 1];
        if (last && last.label === label) last.items.push(p);
        else groups.push({ label, items: [p] });
      }

      return (
        <div className="min-h-screen bg-neutral-950 text-neutral-100">
          <div className="border-b border-sky-400 bg-black sticky top-0 z-40" style={{ paddingTop: 'env(safe-area-inset-top)' }}>
            <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
              <div>
                <div className="font-bold uppercase tracking-tight leading-none text-sm">Derrick's TimeMachine</div>
                <div className="text-[10px] uppercase tracking-[0.25em] text-sky-400 font-bold mt-0.5">Productions</div>
              </div>
              <div className="flex items-center gap-2 flex-wrap justify-end">
                <Btn variant="ghost" size="sm" onClick={onExport}><IDownload/>Export Backup</Btn>
                <Btn variant="ghost" size="sm" onClick={() => importRef.current?.click()}><IUpload/>Import Backup</Btn>
                <input ref={importRef} type="file" accept=".json,application/json" className="hidden" onChange={handleFileSelect} />
                <Btn variant="primary" onClick={onCreate}><IPlus/>New Production</Btn>
              </div>
            </div>
          </div>

          <div className="max-w-6xl mx-auto px-4 py-6 space-y-4">
            <h2 className="text-lg font-semibold tracking-tight flex items-center gap-2"><IBriefcase size={16}/>Your Productions</h2>

            {productions.length === 0 && (
              <div className="bg-neutral-900 border border-dashed border-neutral-700 p-8 text-center text-sm text-neutral-500">
                No productions yet. Create one to get started.
              </div>
            )}

            {groups.map(({ label, items }) => (
              <div key={label} className="space-y-2">
                <div className="text-[10px] uppercase tracking-[0.2em] text-neutral-500 font-semibold pt-2">{label}</div>
                {items.map((p) => (
                  <div key={p.id} className="bg-neutral-900 border border-neutral-800 hover:border-sky-400/40 transition-colors p-4 flex items-center justify-between gap-4 flex-wrap rounded-lg">
                    <div className="flex-1 min-w-0">
                      <div className="font-semibold text-neutral-100 truncate">{p.title || <span className="text-neutral-500 italic">Untitled Production</span>}</div>
                      {p.prodCo && <div className="text-sm text-neutral-400 truncate">{p.prodCo}</div>}
                      <div className="text-[11px] text-neutral-500 mt-1 font-mono">
                        {(p.crew ?? []).length} crew &nbsp;·&nbsp; {(p.days ?? []).length} days
                      </div>
                    </div>
                    <div className="flex items-center gap-2 flex-shrink-0">
                      <Btn variant="ghost" size="sm" onClick={() => onDelete(p.id)} title="Delete production"><ITrash/></Btn>
                      <Btn variant="primary" onClick={() => onOpen(p.id)}>Open →</Btn>
                    </div>
                  </div>
                ))}
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ═══════════════════════════ ROOT ═══════════════════════════ */

    function Root() {
      const [productions, setProductions] = useStoredState("bigals_productions", []);
      const [openId, setOpenId] = useState(null);

      // One-time migration: absorb all old localStorage keys into the productions array
      useEffect(() => {
        try {
          if (productions.length > 0) return;
          const oldProd = localStorage.getItem("bigals_production");
          const oldCrew = localStorage.getItem("bigals_crew");
          const oldDays = localStorage.getItem("bigals_days");
          if (oldProd || oldCrew || oldDays) {
            let p = oldProd ? JSON.parse(oldProd) : { title: "", prodCo: "", crew: [], days: [] };
            if (!p.crew?.length && oldCrew) p.crew = JSON.parse(oldCrew);
            if (!p.days?.length && oldDays) p.days = JSON.parse(oldDays).map(migrateDay);
            if (!p.defaultDay) p.defaultDay = DEFAULT_PRODUCTION_DAY;
            setProductions([{ id: uid(), ...p }]);
            localStorage.removeItem("bigals_production");
            localStorage.removeItem("bigals_crew");
            localStorage.removeItem("bigals_days");
          }
        } catch {}
      }, []); // runs once on mount only

      const openProduction = (id) => setOpenId(id);
      const closeProduction = () => setOpenId(null);
      const deleteProduction = (id) => {
        if (!window.confirm("Delete this production? This cannot be undone.")) return;
        setProductions((prev) => prev.filter((p) => p.id !== id));
        if (openId === id) setOpenId(null);
      };
      const createProduction = () => {
        const p = { id: uid(), title: "Untitled Production", prodCo: "", crew: [], days: [], defaultDay: DEFAULT_PRODUCTION_DAY };
        setProductions((prev) => [...prev, p]);
        setOpenId(p.id);
      };
      const setProduction = (updater) =>
        setProductions((prev) => prev.map((p) =>
          p.id === openId ? (typeof updater === "function" ? updater(p) : updater) : p
        ));

      const handleExport = () => {
        const date = new Date().toISOString().slice(0, 10);
        const payload = JSON.stringify({ version: 1, exportedAt: new Date().toISOString(), productions }, null, 2);
        const blob = new Blob([payload], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `derricks-timemachine-backup-${date}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      };

      const handleImport = (parsed) => {
        const n = parsed.length;
        const msg = productions.length > 0
          ? `Import ${n} production${n === 1 ? '' : 's'}? This will replace your ${productions.length} existing production${productions.length === 1 ? '' : 's'}. This cannot be undone.`
          : `Import ${n} production${n === 1 ? '' : 's'}?`;
        if (!window.confirm(msg)) return;
        setProductions(parsed);
      };

      const currentProduction = productions.find((p) => p.id === openId);

      if (!openId || !currentProduction) {
        return <ProductionsScreen productions={productions} onOpen={openProduction} onCreate={createProduction} onDelete={deleteProduction} onExport={handleExport} onImport={handleImport} />;
      }
      return <ProductionApp production={currentProduction} setProduction={setProduction} onBack={closeProduction} />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Root />);
  </script>
</body>
</html>
